<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ACIM 마음 정화 명상</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --primary-color: #5856d6;
            --text-color: #1c1c1e;
            --secondary-text: #8e8e93;
            --font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-color); }
        body {
            font-family: var(--font-family);
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .container {
            width: 100%; height: 100%; max-width: 500px; max-height: 900px;
            background: var(--card-bg); padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); box-sizing: border-box;
            position: relative; display: flex; flex-direction: column; border-radius: 40px; 
        }

        /* 상단 관리 영역 */
        .admin-header {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            margin-bottom: 1rem; padding: 12px; background: #f8f8fa; border-radius: 20px;
        }
        .admin-header input { padding: 10px; border: 1px solid #e5e5ea; border-radius: 10px; font-size: 0.85rem; }
        .admin-btns { grid-column: span 2; display: flex; gap: 6px; margin-top: 8px; }
        .small-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .save-btn { background-color: #34c759; color: white; }
        .list-btn { background-color: #007aff; color: white; }

        h1 { font-size: 1.3rem; font-weight: 700; text-align: center; margin: 0.5rem 0 1.2rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-color); }

        textarea {
            width: 100%; padding: 14px; border: 1px solid #e5e5ea; border-radius: 16px;
            background-color: #ffffff; font-family: var(--font-family); font-size: 0.95rem;
            line-height: 1.5; box-sizing: border-box; resize: none; transition: all 0.2s; margin-bottom: 0.8rem;
        }

        .audio-control {
            position: absolute; top: 15px; right: 15px; width: 34px; height: 34px;
            border-radius: 50%; background: #f2f2f7; display: none; 
            justify-content: center; align-items: center; cursor: pointer; border: none; color: var(--primary-color);
        }

        .content-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        button.main-btn {
            width: 100%; padding: 18px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 18px; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: auto;
        }

        /* 모달 스타일 */
        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; border-radius: 40px;
            justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: white; width: 100%; max-height: 70%; border-radius: 30px 30px 40px 40px;
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .record-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .record-item { padding: 15px; border-bottom: 1px solid #f2f2f7; display: flex; justify-content: space-between; align-items: center; }
        .record-info { flex: 1; cursor: pointer; }
        .record-info .title { font-weight: 600; font-size: 0.95rem; display: block; }
        .record-info .meta { font-size: 0.75rem; color: var(--secondary-text); }
        .del-btn { color: #ff3b30; border: none; background: none; padding: 10px; font-size: 0.8rem; }

        /* 명상 모드 */
        .meditation-mode { display: none; flex-direction: column; height: 100%; }
        .current-step-text { font-size: 1rem; line-height: 1.7; margin: 1.5rem 0; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; white-space: pre-line; }
        .button-group { display: flex; gap: 10px; margin-top: auto; padding-bottom: 5px; }
        .nav-button { flex: 1; padding: 16px 5px; background-color: #f2f2f7; color: var(--text-color); font-size: 0.95rem; font-weight: 600; border-radius: 14px; border: none; }
        .nav-button.primary { background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <button id="audio-toggle" class="audio-control" onclick="toggleAudio()"><span id="audio-icon">▶</span></button>
        <audio id="step-audio" preload="auto"></audio>

        <div class="admin-header">
            <input type="text" id="user-name" placeholder="사용자 이름">
            <input type="text" id="event-title" placeholder="사건명">
            <div class="admin-btns">
                <button class="small-btn save-btn" onclick="saveToCloud()">내용 저장</button>
                <button class="small-btn list-btn" onclick="openModal()">저장 목록 보기</button>
            </div>
        </div>

        <div id="input-section" class="content-wrapper">
            <h1>마음 정화 명상</h1>
            <label>정화하고 싶은 사건/기억</label>
            <textarea id="event" rows="3" placeholder="어떤 일이 있었나요?"></textarea>
            <label>나의 판단이나 생각</label>
            <textarea id="judgment" rows="3" placeholder="어떤 판단을 하고 있나요?"></textarea>
            <button class="main-btn" onclick="startMeditation()">정화 시작하기</button>
        </div>

        <div id="meditation-section" class="meditation-mode">
            <h2 id="step-title" style="font-size: 0.8rem; color: var(--secondary-text); text-align:center; letter-spacing: 1px;">단계</h2>
            <div id="meditation-content" class="current-step-text"></div>
            <div>
                <label id="insight-label">현재 단계의 통찰</label>
                <textarea id="insight" style="min-height: 100px;" placeholder="느껴지는 것을 적어보세요..." oninput="saveCurrentInsight()"></textarea>
            </div>
            <div class="button-group" id="nav-group">
                <button id="prev-btn" class="nav-button" onclick="goToPrevStep()">이전</button>
                <button id="home-btn" class="nav-button" onclick="goHome()">처음</button>
                <button id="next-btn" class="nav-button primary" onclick="goToNextStep()">다음</button>
            </div>
            <button id="reset-btn" class="main-btn" style="display:none;" onclick="goHome()">새로운 정화 시작</button>
        </div>

        <div id="list-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>저장된 정화 기록</h3>
                    <button style="border:none; background:none; font-size:1.5rem;" onclick="closeModal()">&times;</button>
                </div>
                <ul class="record-list" id="record-list"></ul>
            </div>
        </div>
    </div>

    <script>
        let currentStepIndex = 0;
        let stepInsights = {}; // 단계별 통찰 저장 객체

        let scripts = [
            { title: "준비: 마음 가다듬기", text: "잠시 눈을 감고 깊게 숨을 들이마시고 내뱉습니다.\n이제 성령께 이 기억을 맡길 준비를 합니다.", audio: "audio/step0.mp3" },
            { title: "1단계: 성령께 맡기기", text: `"나는 이 사건을 내가 생각하는 의미로 이해하지 않겠습니다." \n\n"나는 이 상황을 다른 관점에서 보겠습니다."`, audio: "audio/step1.mp3" },
            { title: "2단계: 기억의 정화", text: `"내가 이 기억에 대해 느끼는 분노는 내가 보고 있는 과거에 근거한 것이며, 지금 여기에는 존재하지 않습니다."`, audio: "audio/step2.mp3" },
            { title: "3단계: 용서와 취소", text: `"성령님, 제가 이 기억을 당신의 시각으로 보게 도와주십시오."\n\n과거의 무거운 짐을 내려놓습니다.`, audio: "audio/step3.mp3" }
        ];

        const audioPlayer = document.getElementById('step-audio');
        const audioIcon = document.getElementById('audio-icon');

        // 단계별 통찰 입력 시 즉시 임시 저장
        function saveCurrentInsight() {
            stepInsights[currentStepIndex] = document.getElementById('insight').value;
        }

        function saveToCloud() {
            const user = document.getElementById('user-name').value.trim();
            const title = document.getElementById('event-title').value.trim();
            if(!user || !title) return alert("이름과 사건명을 입력해주세요.");

            const data = {
                user: user, title: title,
                event: document.getElementById('event').value,
                judgment: document.getElementById('judgment').value,
                insights: stepInsights, // 단계별 통찰 전체 저장
                date: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };

            localStorage.setItem(`ACIM_REC_${Date.now()}`, JSON.stringify(data));
            alert("전체 내용이 저장되었습니다.");
        }

        function openModal() {
            const listEl = document.getElementById('record-list');
            listEl.innerHTML = '';
            let count = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('ACIM_REC_')) {
                    count++;
                    const data = JSON.parse(localStorage.getItem(key));
                    const li = document.createElement('li');
                    li.className = 'record-item';
                    li.innerHTML = `<div class="record-info" onclick="loadRecord('${key}')">
                        <span class="title">${data.user} - ${data.title}</span>
                        <span class="meta">${data.date}</span>
                    </div><button class="del-btn" onclick="deleteRecord('${key}')">삭제</button>`;
                    listEl.appendChild(li);
                }
            }
            if(count === 0) listEl.innerHTML = '<li style="text-align:center; padding:20px; color:#8e8e93;">기록이 없습니다.</li>';
            document.getElementById('list-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('list-modal').style.display = 'none'; }

        function loadRecord(key) {
            const data = JSON.parse(localStorage.getItem(key));
            document.getElementById('user-name').value = data.user;
            document.getElementById('event-title').value = data.title;
            document.getElementById('event').value = data.event;
            document.getElementById('judgment').value = data.judgment;
            stepInsights = data.insights || {}; // 저장된 단계별 통찰 복구
            closeModal();
            alert("기록을 불러왔습니다. 정화 시작 시 통찰 내용도 복구됩니다.");
        }

        function deleteRecord(key) {
            if(confirm("삭제하시겠습니까?")) { localStorage.removeItem(key); openModal(); }
        }

        function startMeditation() {
            if (!document.getElementById('event').value) return alert("내용을 입력해주세요.");
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('meditation-section').style.display = 'flex';
            document.getElementById('audio-toggle').style.display = 'flex';
            currentStepIndex = 0;
            updateUI();
        }

        function updateUI() {
            document.getElementById('step-title').innerText = scripts[currentStepIndex].title;
            document.getElementById('meditation-content').innerText = scripts[currentStepIndex].text;
            document.getElementById('insight-label').innerText = `${scripts[currentStepIndex].title.split(':')[0]} 통찰`;
            
            // 현재 단계에 해당하는 통찰 내용 불러오기
            document.getElementById('insight').value = stepInsights[currentStepIndex] || "";
            
            document.getElementById('prev-btn').disabled = (currentStepIndex === 0);
            document.getElementById('next-btn').innerText = (currentStepIndex === scripts.length - 1) ? "완료" : "다음";
            
            playStepAudio(scripts[currentStepIndex].audio);
        }

        function goToNextStep() {
            if (currentStepIndex < scripts.length - 1) { currentStepIndex++; updateUI(); }
            else { finishMeditation(); }
        }

        function goToPrevStep() {
            if (currentStepIndex > 0) { currentStepIndex--; updateUI(); }
        }

        function finishMeditation() {
            audioPlayer.pause();
            document.getElementById('step-title').innerText = "평온";
            document.getElementById('meditation-content').innerText = "정화가 완료되었습니다.";
            document.getElementById('nav-group').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'block';
        }

        function goHome() { location.reload(); }
        function playStepAudio(src) { audioPlayer.src = src; audioPlayer.play().catch(() => {}); }
        function toggleAudio() { if (audioPlayer.paused) audioPlayer.play(); else audioPlayer.pause(); }
        audioPlayer.onplay = () => { audioIcon.innerText = "⏸"; };
        audioPlayer.onpause = () => { audioIcon.innerText = "▶"; };
        window.onclick = (e) => { if (e.target == document.getElementById('list-modal')) closeModal(); }
    </script>
</body>
</html>
