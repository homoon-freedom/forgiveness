<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ACIM 마음 정화 명상</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --primary-color: #5856d6;
            --success-color: #34c759;
            --info-color: #007aff;
            --text-color: #1c1c1e;
            --secondary-text: #8e8e93;
            --font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-color); }
        
        body {
            font-family: var(--font-family);
            display: flex; justify-content: center; align-items: stretch;
            min-height: 100dvh; -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .container {
            width: 100%; max-width: 100%; background: var(--card-bg);
            padding: 1rem; box-sizing: border-box; position: relative;
            display: flex; flex-direction: column;
        }

        /* 상단 관리 영역 레이아웃 수정 */
        .admin-header {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 6px; 
            margin-bottom: 0.8rem; 
            padding: 10px; 
            background: #f2f2f7; 
            border-radius: 12px;
            box-sizing: border-box;
        }
        
        .admin-header input { 
            width: 100%; min-width: 0; padding: 8px; 
            border: 1px solid #e5e5ea; border-radius: 8px; 
            font-size: 0.85rem; background: #fff; box-sizing: border-box;
        }

        /* 버튼 3개를 나란히 배치 */
        .admin-btns { 
            grid-column: span 2; 
            display: flex; 
            gap: 5px; 
            margin-top: 8px; 
        }
        
        .small-btn { 
            flex: 1; padding: 10px 2px; border: none; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 700; cursor: pointer; 
            white-space: nowrap; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        
        .save-btn { background-color: var(--success-color); color: white; }
        .list-btn { background-color: var(--info-color); color: white; }
        
        /* 사각형 오디오 버튼 스타일 */
        .audio-btn-sq { 
            background-color: #e5e5ea; color: var(--text-color); 
            min-width: 60px; /* 재생 아이콘 공간 확보 */
        }
        .audio-btn-sq.playing {
            background-color: #ff9500; color: white;
        }

        h1 { font-size: 1.25rem; font-weight: 700; text-align: center; margin: 0.3rem 0 1rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-color); }

        textarea {
            width: 100%; padding: 14px; border: 1px solid #e5e5ea; border-radius: 12px;
            background-color: #f9f9fb; font-family: var(--font-family); font-size: 0.95rem;
            line-height: 1.5; box-sizing: border-box; resize: none; margin-bottom: 0.8rem;
        }

        .content-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        button.main-btn {
            width: 100%; padding: 16px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; 
            margin-top: auto;
        }

        .meditation-mode { display: none; flex-direction: column; height: 100%; }
        .current-step-text { 
            font-size: 1.05rem; line-height: 1.7; margin: 1.5rem 0; text-align: center; 
            flex: 1; display: flex; align-items: center; justify-content: center; white-space: pre-line; 
        }
        .button-group { display: flex; gap: 8px; margin-top: auto; padding-bottom: 5px; }
        .nav-button { flex: 1; padding: 16px 4px; background-color: #f2f2f7; color: var(--text-color); font-size: 0.95rem; font-weight: 600; border-radius: 10px; border: none; }
        .nav-button.primary { background-color: var(--primary-color); color: white; }

        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000;
            justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: white; width: 100%; max-height: 80%; border-radius: 20px 20px 0 0;
            padding: 1.2rem; box-sizing: border-box; display: flex; flex-direction: column;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <audio id="step-audio" preload="auto"></audio>

        <!-- 상단 헤더: 버튼 3개가 나란히 배치됨 -->
        <div class="admin-header">
            <input type="text" id="user-name" placeholder="이름">
            <input type="text" id="event-title" placeholder="사건명">
            <div class="admin-btns">
                <button class="small-btn save-btn" onclick="saveToCloud()">내용 저장</button>
                <button id="audio-toggle-sq" class="small-btn audio-btn-sq" onclick="toggleAudio()">
                    <span id="audio-icon">▶ 재생</span>
                </button>
                <button class="small-btn list-btn" onclick="openModal()">저장 목록</button>
            </div>
        </div>

        <div id="input-section" class="content-wrapper">
            <h1>마음 정화 명상</h1>
            <label>정화하고 싶은 사건/기억</label>
            <textarea id="event" rows="4" placeholder="어떤 일이 있었나요?"></textarea>
            <label>나의 판단이나 생각</label>
            <textarea id="judgment" rows="4" placeholder="어떤 판단을 하고 있나요?"></textarea>
            <button class="main-btn" onclick="startMeditation()">정화 시작하기</button>
        </div>

        <div id="meditation-section" class="meditation-mode">
            <h2 id="step-title" style="font-size: 0.85rem; color: var(--secondary-text); text-align:center; letter-spacing: 1px;">단계</h2>
            <div id="meditation-content" class="current-step-text"></div>
            <div>
                <label id="insight-label">통찰 기록</label>
                <textarea id="insight" style="min-height: 100px;" placeholder="느껴지는 것을 적어보세요..." oninput="saveCurrentInsight()"></textarea>
            </div>
            <div class="button-group" id="nav-group">
                <button id="prev-btn" class="nav-button" onclick="goToPrevStep()">이전</button>
                <button id="home-btn" class="nav-button" onclick="goHome()">처음</button>
                <button id="next-btn" class="nav-button primary" onclick="goToNextStep()">다음</button>
            </div>
            <button id="reset-btn" class="main-btn" style="display:none;" onclick="goHome()">새로운 정화 시작</button>
        </div>

        <div id="list-modal" class="modal">
            <div class="modal-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0; font-size:1.1rem;">저장 기록</h3>
                    <button style="border:none; background:none; font-size:1.8rem; color:#8e8e93;" onclick="closeModal()">&times;</button>
                </div>
                <div id="record-list" style="flex:1; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentStepIndex = 0;
        let stepInsights = {};
        const scripts = [
            { title: "준비: 마음 가다듬기", text: "잠시 눈을 감고 깊게 숨을 들이마시고 내뱉습니다.\n이제 성령께 이 기억을 맡길 준비를 합니다.", audio: "audio/step1.mp3" },
            { title: "1단계: 성령께 맡기기", text: `"나는 이 사건을 내가 생각하는 의미로 이해하지 않겠습니다." \n\n"나는 이 상황을 다른 관점에서 보겠습니다."`, audio: "audio/step2.mp3" },
            { title: "2단계: 기억의 정화", text: `"내가 이 기억에 대해 느끼는 분노는 내가 보고 있는 과거에 근거한 것이며, 지금 여기에는 존재하지 않습니다."`, audio: "audio/step3.mp3" },
            { title: "3단계: 용서와 취소", text: `"성령님, 제가 이 기억을 당신의 시각으로 보게 도와주십시오."\n\n과거의 무거운 짐을 내려놓습니다.`, audio: "audio/step4.mp3" }
        ];

        const audioPlayer = document.getElementById('step-audio');
        const audioIcon = document.getElementById('audio-icon');
        const audioBtn = document.getElementById('audio-toggle-sq');

        function toggleAudio() {
            if (audioPlayer.paused) audioPlayer.play();
            else audioPlayer.pause();
        }

        audioPlayer.onplay = () => { 
            audioIcon.innerText = "⏸ 정지"; 
            audioBtn.classList.add('playing');
        };
        audioPlayer.onpause = () => { 
            audioIcon.innerText = "▶ 재생"; 
            audioBtn.classList.remove('playing');
        };

        function saveCurrentInsight() { stepInsights[currentStepIndex] = document.getElementById('insight').value; }

        function saveToCloud() {
            const user = document.getElementById('user-name').value.trim();
            const title = document.getElementById('event-title').value.trim();
            if(!user || !title) return alert("이름과 사건명을 입력해주세요.");
            const data = { user, title, event: document.getElementById('event').value, judgment: document.getElementById('judgment').value, insights: stepInsights, date: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) };
            let targetKey = `ACIM_REC_${Date.now()}`;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('ACIM_REC_')) {
                    const ex = JSON.parse(localStorage.getItem(key));
                    if (ex.user === user && ex.title === title) { targetKey = key; break; }
                }
            }
            localStorage.setItem(targetKey, JSON.stringify(data));
            alert("기록이 저장되었습니다.");
        }

        function openModal() {
            const listEl = document.getElementById('record-list');
            listEl.innerHTML = '';
            const keys = [];
            for(let i=0; i<localStorage.length; i++) if(localStorage.key(i).startsWith('ACIM_REC_')) keys.push(localStorage.key(i));
            keys.sort().reverse();
            keys.forEach(key => {
                const d = JSON.parse(localStorage.getItem(key));
                const item = document.createElement('div');
                item.style.cssText = "padding:12px 0; border-bottom:1px solid #f2f2f7; display:flex; justify-content:space-between; align-items:center;";
                item.innerHTML = `
                    <div style="cursor:pointer; flex:1;" onclick="loadRecord('${key}')">
                        <div style="font-weight:600; font-size:0.9rem;">${d.user} - ${d.title}</div>
                        <div style="font-size:0.75rem; color:#8e8e93;">${d.date}</div>
                    </div>
                    <button onclick="deleteRecord('${key}')" style="color:#ff3b30; border:none; background:none; font-size:0.8rem;">삭제</button>
                `;
                listEl.appendChild(item);
            });
            document.getElementById('list-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('list-modal').style.display = 'none'; }
        
        function loadRecord(key) {
            const data = JSON.parse(localStorage.getItem(key));
            document.getElementById('user-name').value = data.user;
            document.getElementById('event-title').value = data.title;
            document.getElementById('event').value = data.event;
            document.getElementById('judgment').value = data.judgment;
            stepInsights = data.insights || {};
            closeModal();
        }

        function deleteRecord(key) { if(confirm("삭제할까요?")) { localStorage.removeItem(key); openModal(); } }

        function startMeditation() {
            if (!document.getElementById('event').value) return alert("내용을 입력해주세요.");
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('meditation-section').style.display = 'flex';
            currentStepIndex = 0;
            updateUI();
        }

        function updateUI() {
            document.getElementById('step-title').innerText = scripts[currentStepIndex].title;
            document.getElementById('meditation-content').innerText = scripts[currentStepIndex].text;
            document.getElementById('insight-label').innerText = `${scripts[currentStepIndex].title.split(':')[0]} 통찰`;
            document.getElementById('insight').value = stepInsights[currentStepIndex] || "";
            document.getElementById('prev-btn').disabled = (currentStepIndex === 0);
            document.getElementById('next-btn').innerText = (currentStepIndex === scripts.length - 1) ? "완료" : "다음";
            
            audioPlayer.src = scripts[currentStepIndex].audio;
            audioPlayer.play().catch(() => {});
        }

        function goToNextStep() { if (currentStepIndex < scripts.length - 1) { currentStepIndex++; updateUI(); } else { finishMeditation(); } }
        function goToPrevStep() { if (currentStepIndex > 0) { currentStepIndex--; updateUI(); } }
        
        function finishMeditation() {
            audioPlayer.pause();
            document.getElementById('step-title').innerText = "평온";
            document.getElementById('meditation-content').innerText = "정화가 완료되었습니다.";
            document.getElementById('nav-group').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'block';
        }
        function goHome() { location.reload(); }
        window.onclick = (e) => { if (e.target == document.getElementById('list-modal')) closeModal(); }
    </script>
</body>
</html>
